<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISE TECH | SECURITY CORE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div id="security-alert" class="security-toast"></div>

<div id="login-screen" class="portal screen active">
    <div class="card">
        <div class="card-content">
            <h2 class="title-glitch">ARISE ACCESS</h2>
            <p id="attempts-info" style="color: #666; margin-bottom: 20px;">المحاولات المتاحة: 3</p>
            
            <input type="text" id="login-user" placeholder="هوية المستخدم" autocomplete="off">
            <input type="password" id="login-pass" placeholder="مفتاح العبور">
            
            <button id="login-btn" class="btn btn-primary" style="width:100%" onclick="handleLogin()">تحقق من الهوية 🛡️</button>
        </div>
    </div>
</div>

<div id="main-screen" class="screen">
    <header>
        <div class="logo"><div class="logo-icon">🧠</div><span>ARISE_TECH</span></div>
        <div class="user-stats">
            <div class="stat-box"><div class="stat-label">المستخدم</div><div class="stat-value" id="display-username">-</div></div>
            <div class="stat-box"><div class="stat-label">النقاط</div><div class="stat-value" id="display-xp">0</div></div>
            <button class="btn btn-danger" onclick="location.reload()">تسجيل خروج</button>
        </div>
    </header>
    
    <div class="main-container">
        <div class="editor-section">
            <div id="editor-container"></div>
            <button class="btn btn-primary" style="width:100%; margin-top:15px; padding:15px;" onclick="runCode()">▶️ تنفيذ النواة</button>
            <div id="output">نظام Arise جاهز...</div>
        </div>
        
        <div class="sidebar">
            <div class="sidebar-card">
                <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                    <div class="mentor-avatar">🎭</div>
                    <div><div class="mentor-name">Ayanokouji</div><div style="font-size:12px; color:#888;">AI Assistant</div></div>
                </div>
                <div class="mentor-msg" id="mentor-msg">مرحباً بك في المنطقة الآمنة.</div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
