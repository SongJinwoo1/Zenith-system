<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISE TECH | NEURAL SYSTEM</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Cairo:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="login-screen" class="screen active">
        <div class="login-card">
            <h1>ARISE<span> ACCESS</span></h1>
            <input type="text" id="uid" value="song.arise" placeholder="ID">
            <input type="password" id="pwd" value="1322010" placeholder="PASSWORD">
            <button onclick="handleLogin()">EXECUTE LOGIN</button>
            <p id="status">System Ready...</p>
        </div>
    </div>

    <div id="main-system" class="screen">
        <header>
            <div class="brand">ARISE_OS</div>
            <div class="xp">XP: <span id="xp-val">0</span></div>
        </header>
        <div class="content">
            <textarea id="editor" placeholder="# اكتب كود بايثون هنا..."></textarea>
            <button id="run-btn" onclick="runPython()">RUN NEURAL SCRIPT</button>
            <div id="console">> Waiting for input...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
